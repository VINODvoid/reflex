services:
  postgres:
    image: postgres:16-alpine
    container_name: reflex_db
    environment:
      POSTGRES_USER: reflex
      POSTGRES_PASSWORD: reflex_dev
      POSTGRES_DB: reflex
    ports:
      - "5432:5432"
    volumes:
      - reflex_pgdata:/var/lib/postgresql/data

volumes:
  reflex_pgdata:
